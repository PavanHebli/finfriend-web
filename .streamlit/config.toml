[server]
# Disable WebSocket compression to reduce CPU overhead during LLM streaming,
# which can help prevent the browser from missing keepalive pings.
enableWebsocketCompression = false
maxUploadSize = 10

[browser]
gatherUsageStats = false

[theme]
# ── Default theme (Light) ─────────────────────────────────────────
# Users can switch to Dark via the ≡ menu → Settings → Theme
base                     = "light"
backgroundColor          = "#f4f6fa"   # soft off-white (not harsh)
secondaryBackgroundColor = "#e8ecf5"   # input fields, expanders — light blue-grey
primaryColor             = "#6366f1"   # buttons, active states — soft indigo
textColor                = "#1a1d2e"   # dark navy text (not pure black)

# ── To try other light palettes, swap these values ────────────────
# light:         backgroundColor="#f5f7fb"  secondary="#eaecf4"  primary="#4f7ef7"  text="#1e2433" (Default)
# Warm cream:    backgroundColor="#faf8f4"  secondary="#f0ece3"  primary="#5b7cf7"  text="#2d2416"
# Cool slate:    backgroundColor="#f4f6fa"  secondary="#e8ecf5"  primary="#6366f1"  text="#1a1d2e"
# Soft teal:     backgroundColor="#f3fafa"  secondary="#e0f2f1"  primary="#0d9488"  text="#0f2027"
# To go dark:    base="dark"  backgroundColor="#0e1117"  secondary="#1a1f2e"  primary="#4f7ef7"  text="#e2e8f0"
